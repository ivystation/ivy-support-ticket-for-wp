name: Release plugin zip

# v* 태그가 push되면 워드프레스용 zip을 빌드하고 GitHub Release에 자산으로 첨부한다.
# plugin-update-checker(PUC v5)가 이 자산을 사용해 워드프레스 어드민에서 자동 업데이트를 제공한다.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version
        id: version
        run: |
          # 태그명에서 v 접두 제거. 예: v0.1.0 -> 0.1.0
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG_NAME#v}"
          echo "tag=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify version consistency
        run: |
          set -e
          VERSION='${{ steps.version.outputs.version }}'
          # 1) 메인 파일 헤더 Version
          HEADER_VER=$(grep -E '^[[:space:]]*\*[[:space:]]*Version:' ivy-support-ticket.php | head -n1 | sed -E 's/.*Version:[[:space:]]*//')
          # 2) IVY_ST_VERSION 상수
          CONST_VER=$(grep -E "define\([[:space:]]*'IVY_ST_VERSION'" ivy-support-ticket.php | head -n1 | sed -E "s/.*'IVY_ST_VERSION'[[:space:]]*,[[:space:]]*'([^']+)'.*/\1/")
          # 3) readme.txt Stable tag
          STABLE_VER=$(grep -E '^Stable tag:' readme.txt | head -n1 | sed -E 's/Stable tag:[[:space:]]*//')

          echo "Tag        : ${VERSION}"
          echo "Header     : ${HEADER_VER}"
          echo "Constant   : ${CONST_VER}"
          echo "Stable tag : ${STABLE_VER}"

          MISMATCH=0
          [ "$HEADER_VER" = "$VERSION" ] || { echo "::error::헤더 Version이 태그와 일치하지 않습니다."; MISMATCH=1; }
          [ "$CONST_VER" = "$VERSION" ] || { echo "::error::IVY_ST_VERSION 상수가 태그와 일치하지 않습니다."; MISMATCH=1; }
          [ "$STABLE_VER" = "$VERSION" ] || { echo "::error::readme.txt Stable tag이 태그와 일치하지 않습니다."; MISMATCH=1; }
          exit "$MISMATCH"

      - name: Build plugin zip
        run: |
          set -e
          # 워드프레스가 설치 zip에서 기대하는 구조는 `<slug>/<files>` 한 단계 하위 디렉터리.
          STAGE="$RUNNER_TEMP/ivy-support-ticket-for-wp"
          rm -rf "$STAGE"
          mkdir -p "$STAGE"
          # rsync로 핵심 파일만 복사 (개발/CI 산출물 제외)
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='docs' \
            --exclude='.gitignore' \
            --exclude='.DS_Store' \
            --exclude='node_modules' \
            --exclude='*.zip' \
            --exclude='*.log' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            ./ "$STAGE/"

          cd "$RUNNER_TEMP"
          zip -rq ivy-support-ticket-for-wp.zip ivy-support-ticket-for-wp
          ls -la ivy-support-ticket-for-wp.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: ${{ runner.temp }}/ivy-support-ticket-for-wp.zip
